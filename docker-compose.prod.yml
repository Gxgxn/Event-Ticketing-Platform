services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: always
    command: start --hostname https://${DOMAIN} --http-enabled=true --proxy-headers xforwarded
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/tickets
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      # These override application.properties via Spring's relaxed binding.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tickets
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://${DOMAIN}/realms/event-ticket-platform
    depends_on:
      - db
      - keycloak

  frontend:
    build:
      context: ./frontend
      args:
        VITE_OIDC_AUTHORITY: https://${DOMAIN}/realms/event-ticket-platform
        VITE_OIDC_REDIRECT_URI: https://${DOMAIN}/callback
        VITE_OIDC_POST_LOGOUT_URI: https://${DOMAIN}/
    restart: always

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
      - keycloak

volumes:
  db-data:
  caddy-data:
  caddy-config:
